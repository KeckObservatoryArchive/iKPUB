transformer:
  hf_model_name: adsabs/astroBERT
  epochs: 10
  batch_size: 32
  learning_rate: 2.0e-5
  max_length: 512
  max_samples: null          # null = use all
  extraction_mode: sentence  # sentence, window, bm25, embedding
  freeze_backbone: false
  dropout: 0.3
  weight_decay: 0.01
  warmup_ratio: 0.06
  patience: 2
  head: mlp                  # mlp, deep_mlp
  pooling: cls               # cls, mean

embedding:
  hf_model_name: allenai/specter # adsabs/astroBERT works here too
  epochs: 20
  batch_size: 32
  learning_rate: 1.0e-3
  dropout: 0.3
  extraction_mode: sentence